<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MDPI Diseases paper thumbnail</title>
  <desc id="desc">Thumbnail-style cover for the paper Diagnostic and Prognostic Utility of Cell-Surface Vimentin Positive Circulating Tumor Cells in Breast Cancer Using an Automated Negative Selection Platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcf8fd"/>
      <stop offset="100%" stop-color="#f3edf7"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a3d8c"/>
      <stop offset="100%" stop-color="#14756f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#5e3669" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="88" y="82" width="1424" height="736" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="88" y="82" width="1424" height="10" fill="url(#line)"/>

  <g transform="translate(146, 140)">
    <rect x="0" y="0" width="126" height="42" rx="21" fill="#f3e3f0"/>
    <text x="63" y="28" text-anchor="middle" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#8b2c79">MDPI</text>

    <text x="0" y="102" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="28" font-weight="700" fill="#8b2c79">Diseases 14(4):130</text>
    <text x="0" y="144" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="24" font-weight="500" fill="#6a6572">Published online: 2026-04-03</text>

    <text x="0" y="244" font-family="'Noto Serif TC','Times New Roman',serif" font-size="56" font-weight="700" fill="#1c1a1f">
      <tspan x="0" dy="0">Diagnostic and Prognostic Utility of</tspan>
      <tspan x="0" dy="74">Cell-Surface Vimentin Positive</tspan>
      <tspan x="0" dy="74">Circulating Tumor Cells in Breast Cancer</tspan>
      <tspan x="0" dy="74">Using an Automated Negative</tspan>
      <tspan x="0" dy="74">Selection Platform</tspan>
    </text>

    <text x="0" y="660" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="24" font-weight="600" fill="#615b68">Key finding</text>
    <text x="0" y="704" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="30" font-weight="500" fill="#2a2630">
      <tspan x="0" dy="0">CSV+ CTC counts outperformed conventional serum markers</tspan>
      <tspan x="0" dy="42">for metastatic-risk stratification in breast cancer.</tspan>
    </text>

    <rect x="0" y="748" width="718" height="2" fill="#e2d7e6"/>
    <text x="0" y="792" font-family="'Noto Sans TC','Segoe UI',sans-serif" font-size="23" font-weight="500" fill="#6a6572">DOI: 10.3390/diseases14040130</text>
  </g>

  <g transform="translate(1130, 196)">
    <circle cx="118" cy="118" r="118" fill="#f3e3f0"/>
    <circle cx="118" cy="118" r="78" fill="#ffffff"/>
    <circle cx="118" cy="118" r="56" fill="#9a3d8c" opacity="0.16"/>
    <circle cx="118" cy="118" r="22" fill="#9a3d8c"/>
    <ellipse cx="80" cy="110" rx="32" ry="20" fill="#58a890" opacity="0.72"/>
    <ellipse cx="160" cy="86" rx="28" ry="18" fill="#9a3d8c" opacity="0.58"/>
    <ellipse cx="154" cy="154" rx="34" ry="20" fill="#14756f" opacity="0.68"/>
